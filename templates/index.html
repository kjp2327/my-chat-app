<!DOCTYPE html>
<html>
<head>
    <title>Global Cool Chat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #2c2f33; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        #chat-window { width: 90%; max-width: 600px; height: 500px; background: #23272a; border-radius: 12px; padding: 20px; overflow-y: auto; border: 1px solid #7289da; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .msg-img { max-width: 280px; border-radius: 10px; display: block; margin-top: 8px; border: 2px solid #7289da; }
        #input-area { display: flex; gap: 10px; width: 90%; max-width: 640px; margin-top: 15px; }
        input[type="text"] { flex-grow: 1; padding: 12px; border-radius: 8px; border: none; background: #40444b; color: white; outline: none; }
        input[type="color"] { width: 50px; height: 45px; border: none; background: none; cursor: pointer; }
        button { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; background: #7289da; color: white; font-weight: bold; transition: 0.2s; }
        button:hover { background: #5b70be; }
        .user-tag { font-weight: bold; margin-right: 8px; }
    </style>
</head>
<body>

    <h2>🌍 Global Chat Room</h2>
    
    <div style="margin-bottom: 15px;">
        <input type="text" id="username" placeholder="Username..." style="width: 150px;" value="User{{ range(1, 999) | random }}">
        <input type="color" id="user-color" value="#00ff00" title="Choose your name color">
    </div>

    <div id="chat-window">
        {% for msg in history %}
            <div><p><span style="color: {{ msg[2] }}" class="user-tag">{{ msg[0] }}:</span> {{ msg[1] | safe }}</p></div>
        {% endfor %}
    </div>

    <div id="input-area">
        <input type="text" id="message" placeholder="Type a message or 'gif:funny'...">
        <button onclick="sendMessage()">SEND</button>
    </div>

    <script>
        // CRITICAL FIX: Empty brackets means "connect to current website"
        const socket = io();

        async function sendMessage() {
            const user = document.getElementById('username').value;
            const input = document.getElementById('message').value;
            const color = document.getElementById('user-color').value;

            if (!input) return;

            if (input.startsWith('gif:')) {
                const keyword = input.replace('gif:', '');
                try {
                    const response = await fetch(`https://tenor.googleapis.com/v2/search?q=${keyword}&key=LIVDSRZULEUB&limit=1`);
                    const data = await response.json();
                    if (data.results.length > 0) {
                        const gifUrl = data.results[0].media_formats.gif.url;
                        socket.emit('send_message', { 
                            username: user, 
                            message: `<img src="${gifUrl}" class="msg-img">`, 
                            color: color 
                        });
                    }
                } catch (e) { console.error("GIF failed to load", e); }
            } else {
                socket.emit('send_message', { username: user, message: input, color: color });
            }
            
            document.getElementById('message').value = '';
        }

        socket.on('receive_message', function(data) {
            const chatWindow = document.getElementById('chat-window');
            const messageDiv = document.createElement('div');
            messageDiv.innerHTML = `<p><span style="color: ${data.color}" class="user-tag">${data.username}:</span> ${data.message}</p>`;
            chatWindow.appendChild(messageDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });

        document.getElementById('message').addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
